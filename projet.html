<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mes projets</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="projets.css">
  <style>
    main {
      padding: 2rem;
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #66cc99;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s;
    }

    .project-card:hover {
      transform: translateY(-5px);
    }

    .project-card img {
      width: 100%;
      height: 10em;
      object-fit: contain;
      border-radius: 8px;
    }

    .project-card span {
      margin-top: 0.8rem;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>
    <header id="main-header"></header>


  <main>
    <h1>Mes Projets</h1>
    <div class="projects-grid">
      <a class="project-card" href="projects/projet-frogcast.html">
        <img src="../images/frogcast.webp" alt="Frogcast">
        <span>Widget de prévision météo.</span>
      </a>
      <a class="project-card" href="projects/projet-nutriscore.html">
        <img src="../images/nutriscore.jpg" alt="Nutriscore">
        <span>Étude du Nutriscore</span>
      </a>
      <a class="project-card" href="projects/projet-depeches.html">
        <img src="../images/depeches.png" alt="Dépêches">
        <span>Classement de dépêches</span>
      </a>
      <a class="project-card" href="projects/projet-sopra.html">
        <img src="../images/sopra-steria.png" alt="Sopra Steria">
        <span>Site pour une entreprise</span>
      </a>
      <a class="project-card" href="projects/projet-brocante.html">
        <img src="../images/brocante.png" alt="Brocante">
        <span>App de gestion d'événements</span>
      </a>
      <a class="project-card" href="projects/projet-word-excel.html">
        <img src="../images/word-excel.png" alt="wrod-excel">
        <span>Interface de vérification Word Excel</span>
      </a>
    </div>
  </main>
  <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('main-header').innerHTML = data;
            })
            .catch(error => console.error('Error loading header:', error));
    </script>
</body>
</html>
